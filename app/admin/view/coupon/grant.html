{extend name="layout/main" /}

{block name="header"}
{/block}

{block name="content"}
<section class="panel">
    <header class="panel-heading">
        <h4>发放优惠劵</h4>
    </header>
    <div class="panel-body">
        <form class="form-horizontal" method="post" onsubmit="return false" role="form">
	        <div class="form-group">
				<label class="col-sm-2 control-label">发放给所有会员</label>
				<div class="col-sm-5">
					<input type="radio" data-type="radio" data-text="是" name="all" value="2" class="yes" />
					<input type="radio" data-type="radio" data-text="否" name="all" value="1" checked class="no" />
				</div>
			</div>
			<div class="form-group member_id">
				<label class="col-sm-2 control-label">会员</label>
				<div class="col-sm-5">
					<select name="member_id" class="form-control col-selectpicker" search="true">
						<option value="">请选择</option>
						{foreach $member as $g}
						<option value="{$g.id}">{if $g.nick_name}{$g.nick_name}{else}{$g.name}{/if}</option>
						{/foreach}
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-2 control-label">请选择优惠劵</label>
				<div class="col-sm-5">
					<select name="coupon_id" class="form-control">
						<option value="">请选择优惠劵</option>
						{foreach $coupon as $g}
						<option value="{$g.id}">{$g.name}，面值{if $g.coupon_money<0}全额{else}￥{$g.coupon_money}{/if}</option>
						{/foreach}
					</select> 		
				</div>
			</div>

            <div class="form-actions">
                <div class="col-sm-offset-2 col-sm-10">
                    <button type="submit" data-url="{:url('coupon/grant')}" onclick="main.ajaxForm(this)" class="btn btn-primary">提交</button>
                </div>
            </div>
        </form>
    </div>
</section>
{/block}


{block name="footer"}
<script>
$(function(){
	$('.yes').click(function(){
		$('.member_id').hide();
	});
	$('.no').click(function(){
		$('.member_id').show();
	});
});
</script>
{/block}
